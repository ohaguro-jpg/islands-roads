<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ISLANDS & ROADS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Shippori+Mincho:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 50% 10%, #e1ebdb, #d4c6ae);
      font-family: 'DM Sans', sans-serif;
      padding: 24px;
    }
    .card {
      width: min(480px, 100%);
      padding: 40px 32px 36px;
      background: #fcfaf4;
      border: 1px solid #c8bfa8;
      border-radius: 22px;
      box-shadow: 0 24px 64px #19392f33;
      text-align: center;
    }
    .kicker {
      display: block;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .22em;
      color: #a67a23;
      margin-bottom: 10px;
    }
    h1 {
      font-family: 'Shippori Mincho', serif;
      font-size: clamp(28px, 6vw, 40px);
      color: #17372f;
      margin-bottom: 6px;
      line-height: 1.1;
    }
    .subtitle {
      font-size: 13px;
      color: #74817c;
      margin-bottom: 36px;
    }
    .choices {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .choice-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      border-radius: 14px;
      text-decoration: none;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform .12s, box-shadow .12s;
    }
    .choice-btn:active { transform: scale(.97); }
    .choice-icon {
      font-size: 32px;
      flex-shrink: 0;
      width: 48px;
      text-align: center;
    }
    .choice-text { text-align: left; }
    .choice-text b {
      display: block;
      font-size: 17px;
      font-weight: 800;
      margin-bottom: 2px;
    }
    .choice-text small {
      font-size: 11px;
      opacity: .8;
    }
    .btn-offline {
      background: #17372f;
      color: #fff;
      box-shadow: 0 8px 24px #17372f44;
    }
    .btn-offline:hover { box-shadow: 0 12px 32px #17372f66; transform: translateY(-1px); }
    .btn-online {
      background: #faf7ec;
      color: #17372f;
      border-color: #c8bfa8;
      box-shadow: 0 4px 12px #19392f14;
    }
    .btn-online:hover { border-color: #b88b2d; box-shadow: 0 8px 20px #b88b2d22; transform: translateY(-1px); }
  </style>
</head>
<body>
  <div class="card">
    <span class="kicker">ISLANDS & ROADS</span>
    <h1>島へ出発しよう</h1>
    <p class="subtitle">どちらで遊びますか？</p>
    <div class="choices">
      <a class="choice-btn btn-offline" href="offline.html">
        <span class="choice-icon">🏝️</span>
        <span class="choice-text">
          <b>オフラインで遊ぶ</b>
          <small>同じ端末で1〜4人対戦・NPC戦</small>
        </span>
      </a>
      <a class="choice-btn btn-online" href="https://islands-roads.onrender.com/online.html">
        <span class="choice-icon">🌐</span>
        <span class="choice-text">
          <b>オンラインで遊ぶ</b>
          <small>友達とリアルタイム対戦</small>
        </span>
      </a>
    </div>
  </div>
</body>
</html>
